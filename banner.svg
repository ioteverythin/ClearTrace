<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.15" />
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="200" r="180" fill="#6366f1" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="600" cy="200" r="200" fill="#06b6d4" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="1000" cy="200" r="180" fill="#f59e0b" opacity="0.06" filter="url(#blur1)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/>
  </g>

  <!-- Trace line visualization (left side) -->
  <g opacity="0.6">
    <!-- Trace path -->
    <polyline points="60,120 120,120 120,180 200,180 200,140 280,140 280,200 340,200"
              fill="none" stroke="url(#accent1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Nodes on trace -->
    <circle cx="60" cy="120" r="4" fill="#6366f1"/>
    <circle cx="120" cy="120" r="4" fill="#6366f1"/>
    <circle cx="120" cy="180" r="4" fill="#6366f1"/>
    <circle cx="200" cy="180" r="4" fill="#6366f1"/>
    <circle cx="200" cy="140" r="4" fill="#6366f1"/>
    <circle cx="280" cy="140" r="4" fill="#6366f1"/>
    <circle cx="280" cy="200" r="4" fill="#6366f1"/>
    <circle cx="340" cy="200" r="4" fill="#6366f1"/>

    <!-- Second trace (replay) -->
    <polyline points="60,130 120,130 120,190 200,190 200,150 280,150 280,210 340,210"
              fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Prism/explain visualization (right side) -->
  <g opacity="0.6">
    <!-- Input beam -->
    <line x1="860" y1="160" x2="920" y2="200" stroke="#94a3b8" stroke-width="2.5"/>
    <!-- Prism triangle -->
    <polygon points="920,160 960,240 880,240" fill="none" stroke="url(#accent2)" stroke-width="2" opacity="0.8"/>
    <!-- Refracted beams -->
    <line x1="960" y1="185" x2="1060" y2="130" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
    <line x1="960" y1="200" x2="1060" y2="180" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <line x1="960" y1="215" x2="1060" y2="230" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
    <line x1="960" y1="225" x2="1060" y2="270" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <!-- Labels on beams -->
    <text x="1070" y="134" fill="#6366f1" font-family="monospace" font-size="11" opacity="0.7">why</text>
    <text x="1070" y="184" fill="#06b6d4" font-family="monospace" font-size="11" opacity="0.7">how</text>
    <text x="1070" y="234" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.7">what</text>
    <text x="1070" y="274" fill="#f59e0b" font-family="monospace" font-size="11" opacity="0.7">fix</text>
  </g>

  <!-- Main title -->
  <text x="600" y="175" text-anchor="middle" fill="#f8fafc" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="64" font-weight="bold" letter-spacing="-2">
    ClearTrace
  </text>

  <!-- Version badge -->
  <rect x="780" y="148" width="52" height="22" rx="4" fill="url(#accent1)" opacity="0.9"/>
  <text x="806" y="164" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="12" font-weight="bold">v0.7</text>

  <!-- Tagline -->
  <text x="600" y="215" text-anchor="middle" fill="#94a3b8" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" letter-spacing="0.5">
    Record. Replay. Explain. Improve.
  </text>

  <!-- Three pillars -->
  <g transform="translate(260, 270)">
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="23" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="13" font-weight="600">RECORD + REPLAY</text>
  </g>
  <g transform="translate(440, 270)">
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="23" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="13" font-weight="600">EXPLAIN + ADVISE</text>
  </g>
  <g transform="translate(620, 270)">
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="23" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="13" font-weight="600">GUARD + IMPROVE</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(0, 340)">
    <line x1="100" y1="0" x2="1100" y2="0" stroke="#1e293b" stroke-width="1"/>
    <text x="200" y="30" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">6 providers</text>
    <text x="370" y="30" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">8 explainers</text>
    <text x="530" y="30" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">10 SE matrices</text>
    <text x="700" y="30" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">785+ tests</text>
    <text x="860" y="30" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">5 report formats</text>
    <text x="1020" y="30" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="12">1 pip install</text>
  </g>
</svg>
