<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient (dark slate blue like the original) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#1e2d3d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1"/>
    </linearGradient>
    <!-- Orange accent gradient (matching original) -->
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8751a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1"/>
    </linearGradient>
    <!-- Cyan accent -->
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1"/>
    </linearGradient>
    <!-- Code panel gradient -->
    <linearGradient id="codebg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:0.95"/>
    </linearGradient>
    <!-- Subtle noise texture via filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Texture overlay -->
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.3"/>

  <!-- Subtle grid overlay -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- ═══ LOGO AREA ═══ -->
  <!-- Prism icon -->
  <g transform="translate(60, 42)">
    <!-- Prism shape -->
    <polygon points="30,0 60,52 0,52" fill="none" stroke="url(#cyan)" stroke-width="2.5"/>
    <!-- Light beam entering -->
    <line x1="-10" y1="22" x2="18" y2="30" stroke="#94a3b8" stroke-width="2"/>
    <!-- Refracted beams -->
    <line x1="45" y1="20" x2="75" y2="8" stroke="#6366f1" stroke-width="1.8" opacity="0.8"/>
    <line x1="48" y1="28" x2="75" y2="24" stroke="#06b6d4" stroke-width="1.8" opacity="0.8"/>
    <line x1="50" y1="36" x2="75" y2="40" stroke="#22c55e" stroke-width="1.8" opacity="0.8"/>
    <line x1="48" y1="44" x2="75" y2="56" stroke="#f59e0b" stroke-width="1.8" opacity="0.8"/>
    <!-- Dots on beams -->
    <circle cx="75" cy="8" r="2.5" fill="#6366f1"/>
    <circle cx="75" cy="24" r="2.5" fill="#06b6d4"/>
    <circle cx="75" cy="40" r="2.5" fill="#22c55e"/>
    <circle cx="75" cy="56" r="2.5" fill="#f59e0b"/>
  </g>

  <!-- Title -->
  <text x="200" y="88" fill="#f1f5f9" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">
    ClearTrace
  </text>

  <!-- Tagline -->
  <text x="62" y="140" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" letter-spacing="0.3">
    Record, replay, explain, and improve LLM agent behavior
  </text>
  <text x="62" y="170" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" letter-spacing="0.3">
    for deterministic regression testing.
  </text>

  <!-- ═══ ORANGE ACCENT BAR ═══ -->
  <rect x="0" y="210" width="1200" height="190" fill="url(#bg)" opacity="0.5"/>
  <rect x="0" y="210" width="1200" height="4" fill="url(#orange)"/>
  <rect x="0" y="396" width="1200" height="2" fill="url(#orange)" opacity="0.3"/>

  <!-- Left panel: What's new in v0.7 -->
  <g transform="translate(62, 230)">
    <rect x="0" y="0" width="380" height="40" rx="6" fill="url(#orange)"/>
    <text x="16" y="27" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700">
      What's new in v0.7
    </text>

    <text x="0" y="72" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600">
      Explainability Engine (formerly Prism):
    </text>
    <text x="0" y="96" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="15">
      PromptLIME, TokenExplainer, Counterfactuals,
    </text>
    <text x="0" y="118" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="15">
      TrajectoryAttributor, ConceptMapper,
    </text>
    <text x="0" y="140" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="15">
      PromptAdvisor, ToolAdvisor, 10 SE Matrices
    </text>
  </g>

  <!-- Right panel: What is ClearTrace? -->
  <g transform="translate(520, 230)">
    <text x="0" y="27" fill="#f1f5f9" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700">
      What is ClearTrace?
    </text>

    <text x="0" y="62" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" line-height="1.6">
      The only library that records what your LLM
    </text>
    <text x="0" y="84" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="15">
      agent did AND explains why it did it.
    </text>
    <text x="0" y="118" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="15">
      SDK-level interception. Zero-cost replay.
    </text>
    <text x="0" y="140" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="15">
      Black-box explainability. One pip install.
    </text>
  </g>

  <!-- ═══ CODE PREVIEW (right side, overlapping) ═══ -->
  <g transform="translate(820, 24)">
    <rect x="0" y="0" width="360" height="185" rx="10" fill="url(#codebg)" stroke="#30363d" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="14" r="5" fill="#febc2e"/>
    <circle cx="48" cy="14" r="5" fill="#28c840"/>
    <!-- Code -->
    <text y="42" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="16" fill="#ff7b72">from</tspan><tspan fill="#c9d1d9"> clear_trace </tspan><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> Recorder</tspan>
    </text>
    <text y="60" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="16" fill="#ff7b72">from</tspan><tspan fill="#c9d1d9"> clear_trace.explain </tspan><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> PromptLIME</tspan>
    </text>
    <text y="86" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="16" fill="#8b949e"># Record</tspan>
    </text>
    <text y="104" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="16" fill="#ff7b72">with</tspan><tspan fill="#c9d1d9"> Recorder(</tspan><tspan fill="#a5d6ff">"cassette.yaml"</tspan><tspan fill="#c9d1d9">):</tspan>
    </text>
    <text y="122" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="32" fill="#c9d1d9">agent.run(</tspan><tspan fill="#a5d6ff">"Summarize report"</tspan><tspan fill="#c9d1d9">)</tspan>
    </text>
    <text y="148" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="16" fill="#8b949e"># Explain</tspan>
    </text>
    <text y="166" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11.5">
      <tspan x="16" fill="#c9d1d9">explainer = PromptLIME(llm=llm)</tspan>
    </text>
  </g>

  <!-- ═══ FEATURE ICONS ROW ═══ -->
  <g transform="translate(0, 420)">
    <!-- Background for icons row -->
    <rect x="0" y="0" width="1200" height="210" fill="#0f1923" opacity="0.6"/>

    <!-- Icon 1: SDK-Level Recording -->
    <g transform="translate(28, 30)">
      <!-- Record icon (circle with dot) -->
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <circle cx="64" cy="36" r="18" fill="none" stroke="#e8751a" stroke-width="2.5"/>
      <circle cx="64" cy="36" r="7" fill="#e8751a"/>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">SDK-Level</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Recording</text>
    </g>

    <!-- Icon 2: Deterministic Replay -->
    <g transform="translate(170, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Play/rewind icon -->
      <polygon points="52,24 52,48 74,36" fill="#06b6d4"/>
      <rect x="56" y="26" width="3" height="20" fill="#06b6d4" transform="translate(-10,0)"/>
      <rect x="52" y="26" width="3" height="20" fill="#06b6d4" transform="translate(-10,0)"/>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">Deterministic</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Replay</text>
    </g>

    <!-- Icon 3: Prompt LIME -->
    <g transform="translate(312, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Prism icon -->
      <polygon points="64,16 84,56 44,56" fill="none" stroke="#22c55e" stroke-width="2.5"/>
      <line x1="38" y1="32" x2="52" y2="38" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="74" y1="30" x2="88" y2="24" stroke="#6366f1" stroke-width="1.5"/>
      <line x1="76" y1="38" x2="88" y2="38" stroke="#22c55e" stroke-width="1.5"/>
      <line x1="74" y1="46" x2="88" y2="52" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" font-style="italic">PromptLIME</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Explainability</text>
    </g>

    <!-- Icon 4: Budget Assertions -->
    <g transform="translate(454, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Dollar/shield icon -->
      <circle cx="64" cy="36" r="20" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <text x="64" y="43" text-anchor="middle" fill="#f59e0b" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700">$</text>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">Budget</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Assertions</text>
    </g>

    <!-- Icon 5: SE Quality Matrices -->
    <g transform="translate(596, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Matrix/grid icon -->
      <g transform="translate(44, 18)">
        <rect x="0" y="0" width="10" height="10" rx="2" fill="#6366f1" opacity="0.9"/>
        <rect x="14" y="0" width="10" height="10" rx="2" fill="#06b6d4" opacity="0.7"/>
        <rect x="28" y="0" width="10" height="10" rx="2" fill="#22c55e" opacity="0.5"/>
        <rect x="0" y="14" width="10" height="10" rx="2" fill="#06b6d4" opacity="0.7"/>
        <rect x="14" y="14" width="10" height="10" rx="2" fill="#22c55e" opacity="0.9"/>
        <rect x="28" y="14" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.7"/>
        <rect x="0" y="28" width="10" height="10" rx="2" fill="#22c55e" opacity="0.5"/>
        <rect x="14" y="28" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.7"/>
        <rect x="28" y="28" width="10" height="10" rx="2" fill="#ef4444" opacity="0.9"/>
      </g>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">10 SE Matrices</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Quality Scoring</text>
    </g>

    <!-- Icon 6: RAG & MCP -->
    <g transform="translate(738, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Database icon -->
      <ellipse cx="64" cy="24" rx="16" ry="6" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <path d="M48,24 L48,48" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <path d="M80,24 L80,48" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <ellipse cx="64" cy="48" rx="16" ry="6" fill="none" stroke="#8b5cf6" stroke-width="2"/>
      <ellipse cx="64" cy="36" rx="16" ry="6" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">RAG &amp; MCP</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Capture</text>
    </g>

    <!-- Icon 7: Pattern Analysis -->
    <g transform="translate(880, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Chart/pattern icon -->
      <polyline points="46,52 54,38 62,44 70,22 78,30" fill="none" stroke="#e8751a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="46" cy="52" r="2.5" fill="#e8751a"/>
      <circle cx="54" cy="38" r="2.5" fill="#e8751a"/>
      <circle cx="62" cy="44" r="2.5" fill="#e8751a"/>
      <circle cx="70" cy="22" r="2.5" fill="#e8751a"/>
      <circle cx="78" cy="30" r="2.5" fill="#e8751a"/>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">Pattern</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Analysis</text>
    </g>

    <!-- Icon 8: 6 Providers -->
    <g transform="translate(1022, 30)">
      <rect x="28" y="0" width="72" height="72" rx="14" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
      <!-- Plugin/connector icon -->
      <g transform="translate(48, 18)">
        <rect x="4" y="0" width="24" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="2"/>
        <rect x="0" y="20" width="32" height="16" rx="3" fill="none" stroke="#22d3ee" stroke-width="2"/>
        <line x1="16" y1="16" x2="16" y2="20" stroke="#22d3ee" stroke-width="2"/>
      </g>
      <text x="64" y="100" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600">6 Providers</text>
      <text x="64" y="118" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">Supported</text>
    </g>

    <!-- Bottom accent line -->
    <line x1="28" y1="145" x2="1172" y2="145" stroke="#334155" stroke-width="0.5"/>

    <!-- Bottom stats -->
    <text x="600" y="178" text-anchor="middle" fill="#64748b" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="3">
      785+ TESTS   |   PYTHON 3.9+   |   MIT LICENSE   |   pip install cleartrace
    </text>
  </g>
</svg>
